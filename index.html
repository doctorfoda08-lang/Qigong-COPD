<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liuzijue Clinical App | Dr.Abd</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#1a2744;
    --gold:#c9a84c;
}

body {
    font-family:'Tajawal',sans-serif;
    margin:0;
    background:#f8f9fa;
    text-align:center;
    transition:background 1s;
}

.container { padding:30px; }

.lung { font-size:100px; transition:0.4s; }

.timer { font-size:50px; font-weight:900; }

.progress {
    width:80%; height:8px;
    background:#ddd; margin:20px auto;
    border-radius:10px; overflow:hidden;
}
.fill {
    width:0%; height:100%;
    background:var(--gold);
    transition:width 0.3s;
}

button, select {
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
}

.start { background:var(--gold); color:white; }
.stop { background:#ef4444; color:white; }

</style>
</head>

<body>

<div class="container">
    <div class="lung" id="lung">🫁</div>

    <h2 id="status">جاهز</h2>
    <div class="timer" id="timer">0</div>

    <div class="progress"><div class="fill" id="fill"></div></div>

    <select id="mode">
        <option value="normal">Normal</option>
        <option value="copd">COPD</option>
    </select>

    <br>

    <button class="start" onclick="start()">Start</button>
    <button class="stop" onclick="pause()">Pause</button>
    <button onclick="resume()">Resume</button>
</div>

<script>
let active = false;
let paused = false;
let breaths = 0;

let settings = {
    normal: {inhale:3, exhale:3},
    copd: {inhale:4, exhale:6}
};

function speak(t){
    speechSynthesis.cancel();
    let u = new SpeechSynthesisUtterance(t);
    u.lang="en-US";
    speechSynthesis.speak(u);
}

function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

async function countdown(sec){
    for(let i=sec;i>=0;i--){
        if(!active) return;
        while(paused) await sleep(200);

        document.getElementById("timer").innerText=i;
        document.getElementById("fill").style.width=((sec-i)/sec)*100+"%";
        await sleep(1000);
    }
}

function setState(type){
    if(type==="inhale"){
        document.body.style.background="#e0f2fe";
        document.getElementById("status").innerText="شهيق";
        document.getElementById("lung").style.transform="scale(1.3)";
    } else {
        document.body.style.background="#f0fdf4";
        document.getElementById("status").innerText="زفير (SI)";
        document.getElementById("lung").style.transform="scale(0.9)";
    }
}

async function run(){
    let mode = document.getElementById("mode").value;
    let inhaleT = settings[mode].inhale;
    let exhaleT = settings[mode].exhale;

    while(active && breaths < 6){

        setState("inhale");
        speak("Inhale");
        await countdown(inhaleT);

        setState("exhale");
        speak("SI");
        await countdown(exhaleT);

        breaths++;
    }

    finish();
}

function start(){
    active = true;
    paused = false;
    breaths = 0;
    run();
}

function pause(){
    paused = true;
}

function resume(){
    paused = false;
}

function finish(){
    active = false;
    document.getElementById("status").innerText="تمت الجلسة ✔️";
    speak("Session completed");
}

</script>

</body>
</html>
